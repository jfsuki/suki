<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SUKI Workflow Builder</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --ink: #1c2530;
      --muted: #657282;
      --line: #d5dde6;
      --accent: #0f7b6c;
      --accent-2: #0b5f53;
      --warn: #b54708;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background: linear-gradient(120deg, #eef2f6 0%, #f7fafc 100%);
    }
    .page {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px 30px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
    }
    .full { grid-column: 1 / -1; }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    .muted { color: var(--muted); font-size: 13px; }
    label { display: block; font-size: 12px; margin: 8px 0 4px; color: var(--muted); }
    input, textarea, select, button {
      width: 100%;
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 84px; resize: vertical; }
    .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    button.secondary {
      background: #f6f8fa;
      color: var(--ink);
      border-color: var(--line);
    }
    button.warn {
      background: #fff7ed;
      color: var(--warn);
      border-color: #f2d6a8;
    }
    pre {
      margin: 0;
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
      background: #0f172a;
      color: #dbe8ff;
      border-radius: 10px;
      padding: 12px;
      overflow: auto;
      max-height: 360px;
    }
    .nodes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .node {
      min-width: 150px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fbfdff;
    }
    .node .t { font-weight: 700; font-size: 12px; margin-bottom: 4px; }
    .node .k { color: var(--muted); font-size: 11px; }
    @media (max-width: 900px) { .page { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="card full">
      <h1>Workflow Builder (WB-3/WB-4 baseline)</h1>
      <div class="muted">Compila lenguaje natural, valida, ejecuta, revisa historial y remix de templates.</div>
    </div>

    <div class="card">
      <h2>WB-2 Compilador NL</h2>
      <label>Workflow ID</label>
      <input id="workflowId" placeholder="wf_cotizacion_ventas" />
      <label>Descripcion (lenguaje natural)</label>
      <textarea id="nlText" placeholder="crear workflow para cotizacion y salida final"></textarea>
      <div class="row">
        <button id="btnCompile">Compilar Propuesta</button>
        <button id="btnApply" class="secondary">Aplicar Propuesta</button>
      </div>
      <div class="row">
        <button id="btnValidate" class="secondary">Validar</button>
        <button id="btnExecute" class="secondary">Ejecutar</button>
      </div>
    </div>

    <div class="card">
      <h2>WB-4 Versioning / Remix</h2>
      <div class="row">
        <button id="btnListTemplates" class="secondary">Ver Templates</button>
        <button id="btnListWorkflows" class="secondary">Ver Workflows</button>
      </div>
      <label>Template ID</label>
      <input id="templateId" placeholder="sales_quote" />
      <div class="row">
        <button id="btnRemix">Remix Template</button>
        <button id="btnHistory" class="secondary">Historial</button>
      </div>
      <label>Revision a restaurar</label>
      <input id="revision" placeholder="1" />
      <button id="btnRestore" class="warn">Restaurar Revision</button>
      <div class="row" style="margin-top:10px;">
        <input id="fromRevision" placeholder="Rev origen" />
        <input id="toRevision" placeholder="Rev destino" />
      </div>
      <button id="btnDiff" class="secondary" style="margin-top:8px;">Comparar Revisiones</button>
    </div>

    <div class="card full">
      <h2>Vista de nodos (WB-3 visual baseline)</h2>
      <div id="graph" class="nodes"></div>
    </div>

    <div class="card full">
      <h2>Salida JSON</h2>
      <pre id="out">{}</pre>
    </div>
  </div>

  <script>
    const out = document.getElementById('out');
    const graph = document.getElementById('graph');
    let lastProposal = null;
    let lastContract = null;

    const api = async (route, payload = {}) => {
      const res = await fetch(`api.php?route=${encodeURIComponent(route)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const json = await res.json();
      out.textContent = JSON.stringify(json, null, 2);
      return json;
    };

    const renderGraph = (contract) => {
      graph.innerHTML = '';
      const nodes = Array.isArray(contract?.nodes) ? contract.nodes : [];
      nodes.forEach((node) => {
        const el = document.createElement('div');
        el.className = 'node';
        el.innerHTML = `
          <div class="t">${node.id || 'node'}</div>
          <div class="k">type: ${node.type || ''}</div>
          <div class="k">${node.title || ''}</div>
        `;
        graph.appendChild(el);
      });
    };

    const workflowIdEl = document.getElementById('workflowId');
    const nlTextEl = document.getElementById('nlText');
    const templateIdEl = document.getElementById('templateId');
    const revisionEl = document.getElementById('revision');
    const fromRevisionEl = document.getElementById('fromRevision');
    const toRevisionEl = document.getElementById('toRevision');

    document.getElementById('btnCompile').onclick = async () => {
      const r = await api('workflow/compile', {
        workflow_id: workflowIdEl.value.trim(),
        text: nlTextEl.value.trim(),
      });
      lastProposal = r?.data || null;
      lastContract = r?.data?.proposed_contract || null;
      if (lastContract) renderGraph(lastContract);
    };

    document.getElementById('btnApply').onclick = async () => {
      if (!lastContract) return;
      const r = await api('workflow/apply', {
        confirm: true,
        proposed_contract: lastContract,
      });
      if (r?.status === 'success') {
        workflowIdEl.value = r?.data?.id || workflowIdEl.value;
      }
    };

    document.getElementById('btnValidate').onclick = async () => {
      if (lastContract) {
        await api('workflow/validate', { contract: lastContract });
      } else {
        await api('workflow/validate', { workflow_id: workflowIdEl.value.trim() });
      }
    };

    document.getElementById('btnExecute').onclick = async () => {
      await api('workflow/execute', {
        workflow_id: workflowIdEl.value.trim(),
        input: { cliente: 'Ana', total: 120000, descripcion: 'cotizacion prueba', periodo: 'hoy', metrica: 'ventas' },
      });
    };

    document.getElementById('btnListTemplates').onclick = async () => {
      await api('workflow/templates', {});
    };

    document.getElementById('btnListWorkflows').onclick = async () => {
      await api('workflow/list', {});
    };

    document.getElementById('btnRemix').onclick = async () => {
      await api('workflow/remix', {
        template_id: templateIdEl.value.trim(),
        workflow_id: workflowIdEl.value.trim(),
      });
    };

    document.getElementById('btnHistory').onclick = async () => {
      await api('workflow/revisions', {
        workflow_id: workflowIdEl.value.trim(),
      });
    };

    document.getElementById('btnRestore').onclick = async () => {
      await api('workflow/restore', {
        workflow_id: workflowIdEl.value.trim(),
        revision: Number(revisionEl.value || 0),
      });
    };

    document.getElementById('btnDiff').onclick = async () => {
      await api('workflow/diff', {
        workflow_id: workflowIdEl.value.trim(),
        from_revision: Number(fromRevisionEl.value || 0),
        to_revision: Number(toRevisionEl.value || 0),
      });
    };
  </script>
</body>
</html>
